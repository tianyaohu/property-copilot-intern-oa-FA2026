name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      dynamodb-local:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Unit tests (geo math, filters, seed data) are pure. The integration
      # tests (tests/properties.integration.test.ts) exercise the geo-index
      # query path against the dynamodb-local service container above; they
      # skip themselves when DYNAMODB_ENDPOINT is unset.
      - name: Test
        run: npm test
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
